	<body class="dark">
		<div class="font1">.</div>
		<div id="unity-container" class="unity-desktop">
			<canvas id="unity-canvas"></canvas>
		</div>
		<div id="loading-cover" style="display: none">
			<div id="unity-loading-bar">
				<div
					style="
						position: absolute;
						bottom: 10px;
						right: 10px;
						font-size: 18px;
						color: #000;
						opacity: 0.5;
					"
				>
					2411071
				</div>
				<img
					src="loading.png?v=1"
					id="ld_bg"
					style="width: 100%; height: 100%; object-fit: cover"
				/>
				<canvas
					id="logo-canvas"
					style="position: absolute; background-color: transparent"
				>
					<img src="loading_fill.png" id="ld_fill" />
					<img src="loading_bar.png" id="ld_bar" />
					<img src="logo.png" id="logo" />
				</canvas>
			</div>
		</div>

		<script>
			const container = document.querySelector("#unity-container");
			const canvas = document.querySelector("#unity-canvas");
			const loadingCover = document.querySelector("#loading-cover");
			const fullscreenButton = document.querySelector(
				"#unity-fullscreen-button",
			);

			const buildUrl = "Build";
			const loaderUrl = buildUrl + "/2411071.loader.js";
			const config = {
				dataUrl: buildUrl + "/2411071.data.unityweb",
				frameworkUrl: buildUrl + "/2411071.framework.js.unityweb",
				codeUrl: buildUrl + "/2411071.wasm.unityweb",
				streamingAssetsUrl: "StreamingAssets",
				companyName: "azgames.io",
				productName: "Crossy Road",
				productVersion: "1.0",
			};

			if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
				container.className = "unity-mobile";
				config.devicePixelRatio = 1;
			}

			function delay(ms) {
				return new Promise((resolve, reject) => {
					setTimeout(() => {
						resolve();
					}, ms);
				});
			}

			async function load() {
				logo_loaded = false;
				createUnityInstance(canvas, config, (progress) => {
					logo_loading_percent = progress;
					drawCanvas(progress);
				})
					.then((unityInstance) => {
						window.unityInstance = unityInstance;
						setTimeout(() => {
							loadingCover.style.display = "none";
							logo_loaded = true;
						}, 2000);
					})
					.catch((message) => {
						alert(message);
					});
			}

			loadingCover.style.display = "";

			var script = document.createElement("script");
			script.src = loaderUrl;
			script.onload = () => {
				load();
			};
			var logo_loaded = false;
			var logo_loading_percent = 0;

			window.onresize = () => {
				drawCanvas(logo_loading_percent);
			};
			window.onload = () => {
				drawCanvas(logo_loading_percent);
			};

			var logo_canvas = document.getElementById("logo-canvas");
			function drawCanvas(_percent = 0) {
				if (logo_loaded) {
					return;
				}
				resizeLogoCanvas();
				var ctx = logo_canvas.getContext("2d");
				var logo = document.getElementById("logo");
				var ld_fill = document.getElementById("ld_fill");
				var ld_bar = document.getElementById("ld_bar");
				var _sw = logo_canvas.width / 1920;
				var _sh = logo_canvas.height / 1080;

				if (_percent > 1) {
					_percent = 1;
				}

				var pl = 890 * _percent;
				var pw = 900 - pl;
				pl = pl + 510;

				ctx.drawImage(logo, 622.5 * _sw, 77 * _sh, 675 * _sw, 396 * _sh);
				ctx.drawImage(
					ld_bar,
					510 * _sw,
					logo_canvas.height - 115.5 * _sh,
					900 * _sw,
					44 * _sh,
				);
				ctx.drawImage(
					ld_fill,
					pl * _sw,
					logo_canvas.height - 111 * _sh,
					pw * _sw,
					35 * _sh,
				);

				//text
				//PERCENT
				var _fontSize = 32 * _sw;
				ctx.font = _fontSize.toString() + "px BRLNSDB";
				ctx.fillStyle = "#ffffff";
				ctx.textAligh = "center";
				ctx.lineWidth = 5 * _sw;
				ctx.strokeStyle = "#000000";
				let _txt = Math.floor(_percent * 100).toString() + "%";
				let _tx =
					logo_canvas.width * 0.5 -
					ctx.measureText(_txt).width * 0.5 * _sw -
					20 * _sw;
				let _ty = logo_canvas.height * 0.5 + 455 * _sh;
				ctx.strokeText(_txt, _tx, _ty);
				ctx.fillText(_txt, _tx, _ty);
			}
			function resizeLogoCanvas() {
				var _w = window.innerWidth;
				var _h = window.innerHeight;
				var _nw = (_h * 16) / 9;
				if (_nw <= _w) {
					logo_canvas.width = _nw;
					logo_canvas.height = _h;
				} else {
					logo_canvas.width = _w;
					logo_canvas.height = (_w * 9) / 16;
				}
			}

			document.body.appendChild(script);
		</script>
