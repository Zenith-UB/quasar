<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Unity WebGL</title>
		<style>
			html,
			body {
				margin: 0;
				padding: 0;
				height: 100%;
				overflow: hidden; /* prevents scrollbars */
				background: black; /* optional */
			}

			#unity-canvas {
				width: 100vw;
				height: 100vh;
				display: block;
			}
		</style>
	</head>

	<body>
		<h1 id="loading">loading...</h1>
		<canvas id="unity-canvas"></canvas>

		<script>
			const canvas = document.getElementById("unity-canvas");
			const loadingText = document.getElementById("loading");

			const config = {
				dataUrl: "Build/2411071.data.unityweb",
				frameworkUrl: "Build/2411071.framework.js.unityweb",
				codeUrl: "Build/2411071.wasm.unityweb",
				streamingAssetsUrl: "StreamingAssets",
				companyName: "Company",
				productName: "Game",
				productVersion: "1.0",
			};

			const script = document.createElement("script");
			script.src = "Build/2411071.loader.js";

			script.onload = () => {
				createUnityInstance(canvas, config)
					.then(() => {
						loadingText.remove();
					})
					.catch((err) => console.error(err));
			};
			function resizeCanvas() {
				canvas.width = window.innerWidth;
				canvas.height = window.innerHeight;
			}

			window.addEventListener("resize", resizeCanvas);
			resizeCanvas();
			document.body.appendChild(script);
		</script>
	</body>
</html>
