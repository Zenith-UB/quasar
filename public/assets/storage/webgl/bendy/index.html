<!doctype html>
<html lang="en-us">
	<head>
		<meta charset="utf-8" />
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
		<title>Unity WebGL Player | Bendy and the Ink Machine</title>
	</head>
	<body
		style="
			text-align: center;
			padding: 0;
			border: 0;
			width: 100vw;
			height: 100vh;
			margin: 0;
			overflow: hidden;
			background-color: black;
		"
	>
		<div
			id="loading-text"
			style="
				color: white;
				font-size: 48px;
				font-family: cursive;
				text-align: center;
				margin-top: 20px;
			"
		>
			LOADING...
		</div>
		<canvas
			id="unity-canvas"
			width="100%"
			height="100%"
			tabindex="-1"
			style="width: 100%; height: 100%; background: #808080"
		></canvas>
		<script src="Build/BATIMFullPort.loader.js"></script>
		<script>
			var loadingText = document.querySelector("#loading-text");
			let totalBytes = 0;
			let loadedBytes = 0;

			async function fetchWithProgress(url) {
				const response = await fetch(url);
				const reader = response.body.getReader();
				let chunks = [];
				let received = 0;
				while (true) {
					const { done, value } = await reader.read();
					if (done) break;
					received += value.length;
					loadedBytes += value.length;
					chunks.push(value);
					let mbDone = (loadedBytes / (1024 * 1024)).toFixed(2);
					let mbTotal = "684.84";
					loadingText.textContent = `LOADING... ${mbDone} MB / ${mbTotal} MB`;
				}
				let fullBuffer = new Uint8Array(received);
				let offset = 0;
				for (let chunk of chunks) {
					fullBuffer.set(chunk, offset);
					offset += chunk.length;
				}
				return fullBuffer.buffer;
			}

			async function mergeFiles(fileParts, cacheKey) {
				const buffers = await Promise.all(
					fileParts.map((part) => fetchWithProgress(part)),
				);
				const mergedBlob = new Blob(buffers);
				return URL.createObjectURL(mergedBlob);
			}

			function getParts(file, start, end) {
				let parts = [];
				for (let i = start; i <= end; i++) {
					parts.push(file + ".part" + i);
				}
				return parts;
			}

			(async () => {
				const [dataUrl, wasmUrl] = await Promise.all([
					mergeFiles(
						getParts("Build/BATIMFullPort.data", 1, 33),
						"BATIMFullPort.data",
					),
					mergeFiles(
						getParts("Build/BATIMFullPort.wasm", 1, 2),
						"BATIMFullPort.wasm",
					),
				]);
				var canvas = document.querySelector("#unity-canvas");

				function unityShowBanner(msg, type) {}

				var buildUrl = "Build";
				var loaderUrl = buildUrl + "/BATIMFullPort.loader.js";
				var config = {
					dataUrl: dataUrl,
					frameworkUrl: buildUrl + "/BATIMFullPort.framework.js",
					codeUrl: wasmUrl,
					streamingAssetsUrl: "StreamingAssets",
					companyName: "Joey Drew Studios",
					productName: "Bendy and the Ink Machine",
					productVersion: "1.0",
					showBanner: unityShowBanner,
				};

				if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
					var meta = document.createElement("meta");
					meta.name = "viewport";
					meta.content =
						"width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes";
					document.getElementsByTagName("head")[0].appendChild(meta);
					container.className = "unity-mobile";
					canvas.className = "unity-mobile";
				} else {
					function resizeCanvas() {
						canvas.width = window.innerWidth;
						canvas.height = window.innerHeight;
						canvas.style.width = window.innerWidth + "px";
						canvas.style.height = window.innerHeight + "px";
					}
					window.addEventListener("resize", resizeCanvas);
					resizeCanvas();
				}

				var script = document.createElement("script");
				script.src = loaderUrl;
				script.onload = () => {
					createUnityInstance(canvas, config, (progress) => {})
						.then((unityInstance) => {
							loadingText.remove();
						})
						.catch((message) => {
							alert(message);
						});
				};

				document.body.appendChild(script);
			})();
		</script>
	</body>
</html>
