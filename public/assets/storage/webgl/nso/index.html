<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>NSO</title>
		<style>
			body {
				margin: 0;
				background: #000000;
				overflow: hidden;
			}

			/* FIX: style the actual Unity canvas */
			#unity-canvas {
				width: 100%;
				height: 100vh;
				display: block;
			}

			/* Optional: make sure container doesn't constrain sizing */
			#unity-container {
				width: 100%;
				height: 100vh;
			}

			#loader {
				position: fixed;
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
				color: #fff;
				font-family: Arial;
				text-align: center;
			}
			#loader.hide {
				display: none;
			}
		</style>
	</head>
	<body>
		<!-- FIX: remove hidden so it can be seen -->
		<div id="unity-container" class="unity-desktop">
			<canvas id="unity-canvas" tabindex="-1"></canvas>
			<div id="unity-warning"></div>
		</div>

		<div id="loader">
			<div
				id="loading-text"
				style="
					color: white;
					font-family: Inter, sans-serif;
					font-size: 48px;
					text-align: center;
					margin-top: 20px;
				"
			>
				Parts downloaded (0/4)
			</div>
		</div>

		<script>
			const canvas = document.getElementById("unity-canvas");
			const loader = document.getElementById("loader");

			function mergeFiles(fileParts) {
				return new Promise((resolve, reject) => {
					const buffers = [];

					function fetchPart(index) {
						if (index >= fileParts.length) {
							const mergedBlob = new Blob(buffers);
							const mergedFileUrl = URL.createObjectURL(mergedBlob);
							resolve(mergedFileUrl);
							return;
						}
						fetch(fileParts[index])
							.then((response) => {
								if (!response.ok) {
									throw new Error(
										`Failed to fetch ${fileParts[index]}: ${response.status}`,
									);
								}
								return response.arrayBuffer();
							})
							.then((data) => {
								buffers.push(data);
								document.getElementById("loading-text").textContent =
									`Parts downloaded (${index + 1}/${fileParts.length})`;
								fetchPart(index + 1);
							})
							.catch(reject);
					}

					fetchPart(0);
				});
			}

			function getParts(file, start, end) {
				const parts = [];
				for (let i = start; i <= end; i++) parts.push(file + ".part" + i);
				return parts;
			}

			Promise.all([
				mergeFiles(getParts("Build/nsoweather2.data.unityweb", 1, 4)),
			])
				.then(([dataUrl]) => {
					const loaderUrl = "Build/nsoweather2.loader.js";

					const config = {
						dataUrl,
						frameworkUrl: "Build/nsoweather2.framework.js.unityweb",
						codeUrl: "Build/nsoweather2.wasm.unityweb",
						streamingAssetsUrl: "StreamingAssets",
						companyName: "WSS playground",
						productName: "Windose",
						productVersion: "1.4.0",
					};

					const script = document.createElement("script");
					script.src = loaderUrl;

					script.onload = () => {
						createUnityInstance(canvas, config)
							.then(() => {
								loader.classList.add("hide");
							})
							.catch((err) => {
								console.error(err);
								document.getElementById("loading-text").textContent =
									"Unity failed to start. Check console.";
							});
					};

					script.onerror = () => {
						document.getElementById("loading-text").textContent =
							"Failed to load Unity loader script. Check loaderUrl/path.";
					};

					document.body.appendChild(script);
				})
				.catch((err) => {
					console.error(err);
					document.getElementById("loading-text").textContent =
						"Failed to download data parts. Check console.";
				});
		</script>
	</body>
</html>
